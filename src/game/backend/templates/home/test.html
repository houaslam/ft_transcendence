<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link href="./style.css" rel="stylesheet">
</head>

<body>

    <div class="wrapper">

        <div class="container">
            <div class="circular-progress">
                <span class="progress-value">0 second</span>
            </div>
        </div>
    </div>
    <!-- JavaScript -->
    <script>
        let circularProgress = document.querySelector(".circular-progress"),
            progressValue = document.querySelector(".progress-value");

        let progressStartValue = 0,
            progressEndValue = 10,
            speed = 100;

        let progress = setInterval(() => {
            progressStartValue++;

            // Calculate the percentage of progress
            let progressPercentage = (progressStartValue / progressEndValue) * 100;

            // Update the text
            progressValue.textContent = `${progressStartValue} s`;

            // Update the background - now using progressPercentage to determine the angle
            circularProgress.style.background = `conic-gradient(#7d2ae8 ${progressPercentage * 3.6}deg, #ededed 0deg)`;

            if (progressStartValue >= progressEndValue) {
                clearInterval(progress);
            }
        }, speed);
    </script>
</body>


</html>
