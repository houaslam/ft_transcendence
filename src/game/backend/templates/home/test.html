<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <style>
        * {
            padding: 0px;
            margin: 0px;
            overflow: hidden;
        }
        
        body {
            background-color: #333334;
        }
        
        .match_popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: black;
            border-radius: 5px;
            width: 200px;
            padding: 1rem 2rem;
            border: 1px solid #8056DE;
            border-radius: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .user_list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }
        
        .match_popup p {
            text-align: center;
            color: white;
            margin-bottom: 1rem;
        }
        
        .match_popup li {
            background-color: #333334;
            border-radius: 50px;
            display: flex;
            align-items: center;
            padding: 0.5rem 1rem;
            gap: 0.5rem;
            list-style: none;
        }
        
        .user {
            color: white;
            line-height: 1;
            margin: 0;
        }
        
        .profile-pic {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>

</head>

<body>

    <main id="canva">

        <div class="match_popup">
            <div class="">
                <p>waiting for others</p>
            </div>
            <ul class="user_list">

                <li>
                    <img class="profile-pic" src=" ./image.png ">
                    <p class="user">HAJAR</p>
                </li>
                <li>
                    <img class="profile-pic" src=" ./image.png ">
                    <p class="user">HOUDA</p>
                </li>
                <li>
                    <img class="profile-pic" src=" ./image.png ">
                    <p class="user">HIND</p>
                </li>
                <li>
                    <img class="profile-pic" src=" ./image.png ">
                    <p class="user">KAOUTHAR</p>
                </li>
            </ul>
        </div>
    </main>



</body>

</html>
