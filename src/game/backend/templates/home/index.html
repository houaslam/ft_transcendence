{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="{% static '/css/style.css' %}">
    <style>
        * {
            padding: 0px;
            margin: 0px;
            overflow: hidden;
        }
        
        body {
            width: 100%;
            height: 100vh;
        }
        
        #custom-form {
            position: fixed;
            gap: 2rem;
            background-color: rgb(49, 48, 48);
            width: 400px;
            padding: 2rem 0rem;
            text-align: center;
            color: aliceblue;
            z-index: 10;
            border-radius: 10px;
        }
        
        .label {
            font-weight: bold;
            margin-top: 15px;
        }
        
        #play {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        #play:hover {
            background-color: #45a049;
        }
        
        #popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background-color: rgb(49, 48, 48);
            width: 300px;
            height: 200px;
            text-align: center;
            color: aliceblue;
            z-index: 10;
            transition-duration: 600ms;
            border-radius: 10px;
        }
        
        #back {
            background-color: gray;
            border: none;
            padding: 1rem;
            border-radius: 10px;
        }
        
        #back:hover {
            cursor: pointer;
            background-color: rgb(189, 189, 189);
        }
        
        #scorePanel {
            z-index: 10;
            position: fixed;
            color: white;
        }
        
        #timePanel {
            z-index: 10;
            position: fixed;
            left: 70%;
            color: white;
        }
        
        #match_popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background-color: rgb(189, 189, 189);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            /* gap: 1rem; */
            padding: 1rem 2rem;
            z-index: 10;
        }
        
        #match_popup li {
            color: aquamarine;
        }
    </style>

</head>

<body>

    <main id="canva">

        <h1 id='game'></h1>

        <button id="VS">VS</button>
        <button id="MULTI">MULTI</button>
        <button id="RPS">RPS</button>
        <button id="TOURN">TOURN</button>
        <button id="LOCAL">LOCAL</button>
    </main>

    <script type="module" src="{% static '/js/home.js' %}"></script>


</body>

</html>
