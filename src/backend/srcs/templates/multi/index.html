{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>vsFriend</title>
	<link rel="stylesheet" href="{% static '/css/style.css' %}">
	<style>
		#popup {
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%) scale(0);
			background-color: rgb(49, 48, 48);
			width: 300px;
			height: 200px;
			text-align: center;
			color: aliceblue;
			z-index: 10;
			transition-duration: 600ms;
			border-radius: 10px;
		}
		
		#back {
			background-color: gray;
			border: none;
			padding: 1rem;
			border-radius: 10px;
		}
		
		#back:hover {
			cursor: pointer;
			background-color: rgb(189, 189, 189);
		}

		* {
			padding: 0px;
			margin: 0px;
			overflow: hidden;
		}

		body {
			width: 100%;
			height: 100vh;
		}

		#scores {
			display: flex;
			flex-direction: row;
			gap: 90%;
			position: absolute;
			color: white;
			top: 25%;
			left: 37%;
			width: 25%;
			background-color: red;
		}
	</style>

</head>

<body>

	<main id="canva">

		<h1 id='game'></h1>

		<div id="scores">
			<h2 id="player1_score">0</h2>
			<h2 id="player2_score">0</h2>
		</div>


		<script type="module">
			import * as MULTI from "{% static '/js/multiPlayer.js' %}" ; MULTI.start()
		</script>


	</main>


</body>

</html>

</html>
