{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vsFriend</title>
    <link rel="stylesheet" href="{% static '/css/style.css' %}">
    <style>
        #popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background-color: rgb(49, 48, 48);
            width: 300px;
            height: 200px;
            text-align: center;
            color: aliceblue;
            z-index: 10;
            transition-duration: 600ms;
            border-radius: 10px;
        }
        
        #back {
            background-color: gray;
            border: none;
            padding: 1rem;
            border-radius: 10px;
        }
        
        #back:hover {
            cursor: pointer;
            background-color: rgb(189, 189, 189);
        }
    </style>

</head>

<body>

    <main id="canva">

        <h1 id='game'></h1>

        <div id="scores">
            <h2 id="player_score">0</h2>
            <h2 id="other_score">0</h2>
        </div>


        <script type="module">
            import * as INVITE from "{% static '/js/game.js' %}" ; INVITE.start()
        </script>


    </main>


</body>

</html>

</html>
